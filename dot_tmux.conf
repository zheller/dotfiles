# space is a nice key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# vim like
bind q select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# special commands
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
bind-key C-l send-keys -R \; send-keys "clear" Enter \; run-shell "sleep 0.05; tmux clear-history -t #{pane_id}" \; display-message "Cleared"
bind-key N command-prompt -p "Session name:" { new-session -A -s "%1" }

# rebind keys to open in same directory
bind-key c new-window -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"

# cycle sessions
bind -n M-Tab switch-client -n 
bind -n M-S-Tab switch-client -p

# cycle windows
bind -n M-` next-window
bind -n M-~ previous-window

# cycle panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind | split-window -h
bind - split-window -v

bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"
set -as terminal-features ",*:cstyle"
# Fix double-width cursor at line start in some UTF-8 TUIs under iTerm2/tmux.
set -ga terminal-overrides ",tmux-256color:U8=0"
set -ga terminal-overrides ",xterm-256color:U8=0"

set -g mouse on
set -g set-clipboard on
set -g mode-keys vi
set -g history-limit 100000
set -g update-environment "DISPLAY SSH_AUTH_SOCK SSH_AGENT_PID PATH"
set -g detach-on-destroy off

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

set -g xterm-keys on
set -g extended-keys on
set -g extended-keys-format csi-u

# copy mode
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-lines single
set -g pane-border-indicators off
set -g pane-border-style 'fg=colour238,bg=default'
set -g pane-active-border-style 'fg=colour250,bg=default'
set -g pane-border-status off
# NOTE: pane-border-status top can render color bleed/glitches on some terminals/tmux builds.
# Keep it off to avoid active-border color appearing on inactive panes.

# statusbar
set -g status-position bottom 
set -g status-justify left 
set -g status-style 'fg=red bg=white'

set -g status-left '#S > '
set -g status-left-length 15
set -g status-left-style 'fg=black bg=white'

set -g status-right-style 'fg=black bg=white'
set -g status-right ' %Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=blue'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=black bg=grey'
setw -g window-status-format ' #I #[fg=black]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# messages
set -g message-style 'fg=black bg=blue bold'
