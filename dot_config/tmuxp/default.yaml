# Use via `tmuxp load .`.
# A shell wrapper rewrites `.` -> `default` and injects `-s <git-root-name>`.
session_name: default
shell_command_before:
  - 'git_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"; cd "$git_root"'
windows:
  - window_name: work
    layout: main-horizontal
    focus: true
    options:
      main-pane-height: 67%
    panes:
      - shell_command: vim
      - shell_command: pi
        focus: true
      - shell_command:

  - window_name: git
    panes:
      - shell_command: lazygit
